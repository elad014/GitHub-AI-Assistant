services:
  - type: web
    name: github-ai-assistant
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-6
      - key: DATABASE_URL
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: KAFKA_TOPIC
        value: ai-events
      - key: CHAT_HISTORY_SIZE
        value: "10"
