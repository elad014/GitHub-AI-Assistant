services:
  - type: web
    name: github-ai-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-6
      - key: DATABASE_URL
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: KAFKA_BOOTSTRAP_SERVERS
        value: ""
      - key: KAFKA_TOPIC
        value: ai-events
      - key: CHAT_HISTORY_SIZE
        value: "10"

  - type: web
    name: github-ai-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    rootDir: frontend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
