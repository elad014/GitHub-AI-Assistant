server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 180s;
    }

    # SPA entrypoint must not be browser-cached; otherwise old React bundles can
    # keep client-side redirects/routes after a rebuild.
    location = /index.html {
        etag off;
        if_modified_since off;
        expires -1;
        add_header Pragma "no-cache" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        # Ask the browser to drop HTTP cache for this origin (helps Brave/Chrome
        # when normal-window cache survives DevTools "clear site data").
        add_header Clear-Site-Data "cache" always;
        try_files /index.html =404;
    }

    # Local/dev builds change frequently; prevent Brave/Chrome from reusing a
    # stale JS bundle with the same generated asset URL.
    location /assets/ {
        etag off;
        if_modified_since off;
        expires -1;
        add_header Pragma "no-cache" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Clear-Site-Data "cache" always;
        try_files $uri =404;
    }

    location / {
        etag off;
        if_modified_since off;
        expires -1;
        add_header Pragma "no-cache" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Clear-Site-Data "cache" always;
        try_files $uri $uri/ /index.html;
    }
}
